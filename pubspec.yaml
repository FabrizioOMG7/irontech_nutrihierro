name: irontech_nutrihierro
description: "App móvil IronTech NutriHierro para prevención de anemia infantil."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Gestión de Estado (Arquitectura)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Base de Datos Offline (Para zonas rurales sin internet)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Firebase (Backend y Notificaciones)
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2

  # UI y Utilidades (Cámara y Diseño)
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Generadores de código para Riverpod e Isar
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  
  # Aquí agregaremos nuestros assets (imágenes y logos) más adelante
  # assets:
  #   - assets/images/
  #   - assets/icons/